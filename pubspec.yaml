name: master_sud
description: Master Sud - Peintures & Revêtements
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2

  # UI / UX
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  intl: ^0.19.0
  url_launcher: ^6.3.1
  photo_view: ^0.15.0

  # Color Try-On (Catalogue)
  image_picker: ^1.1.2
  gal: ^2.3.0

  # Formation — lecture vidéo Firebase (player plein écran)
  video_player: ^2.9.2

  # Notifications de promotions (Firebase Cloud Messaging + affichage local)
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
